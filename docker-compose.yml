services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: iga
      POSTGRES_PASSWORD: iga_dev_password
      POSTGRES_DB: iga_gestao
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iga -d iga_gestao"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-dev
    command: ["sh", "-c", "npm install && npm run db:migrate:pg"]
    environment:
      NODE_ENV: development
      IGA_STORAGE_DRIVER: postgres
      DATABASE_URL: postgresql://iga:iga_dev_password@postgres:5432/iga_gestao
    volumes:
      - ./services/api:/app/services/api
      - backend_node_modules:/app/services/api/node_modules
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-dev
    command: ["sh", "-c", "npm install && npm run dev"]
    environment:
      NODE_ENV: development
      PORT: "3000"
      FRONTEND_URL: http://localhost:5173
      IGA_STORAGE_DRIVER: postgres
      IGA_DATA_DIR: /app/services/api/data
      ADMIN_DEFAULT_EMAIL: admin@iga.com
      ADMIN_DEFAULT_PASSWORD: IgaGestao@2026!
      DATABASE_URL: postgresql://iga:iga_dev_password@postgres:5432/iga_gestao
      REDIS_URL: redis://redis:6379
      PROXY_CACHE_TTL_MS: "300000"
      ALLOW_PRIVATE_HOSTS: localhost,127.0.0.1,host.docker.internal
      IGA_PROCESS_ROLE: web
    ports:
      - "3000:3000"
    volumes:
      - ./services/api:/app/services/api
      - backend_node_modules:/app/services/api/node_modules
      - backend_data:/app/services/api/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend-dev
    working_dir: /app/apps/web
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    environment:
      VITE_API_BASE_URL: http://localhost:3000
      VITE_HTTP_TIMEOUT_MS: "180000"
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/app/apps/web
      - frontend_node_modules:/app/apps/web/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  landing:
    build:
      context: .
      dockerfile: Dockerfile
      target: landing-dev
    working_dir: /app/apps/landing
    command: ["sh", "-c", "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"]
    environment:
      NODE_ENV: development
    ports:
      - "3002:3000"
    volumes:
      - ./apps/landing:/app/apps/landing
      - landing_node_modules:/app/apps/landing/node_modules
      - landing_next_cache:/app/apps/landing/.next

  iga-ai:
    profiles: ["ai"]
    build:
      context: ./services/ai
      dockerfile: Dockerfile
      target: production
    environment:
      PORT: "4000"
      ENV: development
      LOG_LEVEL: INFO
      LLM_PROVIDER: ${LLM_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      IGA_AI_SHARED_SECRET: ${IGA_AI_SHARED_SECRET:-}
      NODE_BACKEND_URL: http://backend:3000
      DATABASE_URL: postgresql://iga:iga_dev_password@postgres:5432/iga_gestao
      VOYAGE_API_KEY: ${VOYAGE_API_KEY:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:4000/health/live').raise_for_status()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend-dev
    command: ["sh", "-c", "npm install && npm run worker"]
    environment:
      NODE_ENV: development
      IGA_PROCESS_ROLE: worker
      IGA_STORAGE_DRIVER: postgres
      IGA_DATA_DIR: /app/services/api/data
      ADMIN_DEFAULT_EMAIL: admin@iga.com
      ADMIN_DEFAULT_PASSWORD: IgaGestao@2026!
      DATABASE_URL: postgresql://iga:iga_dev_password@postgres:5432/iga_gestao
      REDIS_URL: redis://redis:6379
      PROXY_CACHE_TTL_MS: "300000"
      ALLOW_PRIVATE_HOSTS: localhost,127.0.0.1,host.docker.internal
    volumes:
      - ./services/api:/app/services/api
      - backend_node_modules:/app/services/api/node_modules
      - backend_data:/app/services/api/data
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres_data:
  redis_data:
  backend_node_modules:
  backend_data:
  frontend_node_modules:
  landing_node_modules:
  landing_next_cache:
