name: Bug report
description: Reportar um bug reproduzivel
title: "[bug] "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Obrigado por reportar! Por favor, preencha o maximo de info para acelerar a correcao.

  - type: textarea
    id: description
    attributes:
      label: Descricao
      description: O que aconteceu?
      placeholder: Ao clicar em "Salvar dashboard" o app trava por 5s e mostra tela branca.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Passos para reproduzir
      placeholder: |
        1. Logar como admin
        2. Ir em /dashboard
        3. Clicar em "Salvar"
        4. Esperar 5s -> tela branca
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportamento esperado
      placeholder: Dashboard salva e mostra confirmacao em <1s.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportamento atual
      placeholder: Travamento + tela branca + erro no console.

  - type: dropdown
    id: severity
    attributes:
      label: Severidade
      options:
        - SEV-0 (vazamento PII / downtime total)
        - SEV-1 (feature critica quebrada)
        - SEV-2 (feature secundaria quebrada)
        - SEV-3 (cosmetico / inconveniencia)
      default: 2
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Ambiente
      placeholder: Producao | Staging | Local | Beta tenant XYZ
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser/OS (se aplicavel)
      placeholder: Chrome 121 / Windows 11

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      description: Cole aqui logs do console, network, ou anexe screenshots.
      render: shell
