name: Security

on:
  pull_request:
    branches: [main, develop, master]
  push:
    branches: [main, develop, master]
  schedule:
    # Roda toda segunda 06:00 UTC para detectar CVEs novos em deps congeladas.
    - cron: '0 6 * * 1'

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  secrets-scan:
    name: Secrets (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Falha o job se encontrar segredos. Para suprimir achados conhecidos use .gitleaksignore.

  sca-backend:
    name: SCA backend (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/api/package-lock.json
      - run: npm ci --ignore-scripts
      # Falha em high/critical. Mediums sao reportados mas nao bloqueiam.
      - run: npm audit --audit-level=high --omit=dev

  sca-frontend:
    name: SCA frontend (npm audit)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npm audit --audit-level=high --omit=dev

  sast-semgrep:
    name: SAST (Semgrep OWASP)
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - run: semgrep ci
        env:
          SEMGREP_RULES: >-
            p/owasp-top-ten
            p/javascript
            p/typescript
            p/react
            p/nodejsscan
            p/security-audit

  trivy-fs:
    name: Trivy filesystem scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
      - name: Upload Trivy results to Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-fs.sarif

  trivy-image:
    name: Trivy container image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build --target production -t iga-gestao:ci-${{ github.sha }} .
      - uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: iga-gestao:ci-${{ github.sha }}
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true
          format: sarif
          output: trivy-image.sarif
      - name: Upload Trivy image results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif

  sbom-backend:
    name: SBOM backend (CycloneDX)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/api/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npx --yes @cyclonedx/cyclonedx-npm --output-format JSON --output-file sbom-backend.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom-backend
          path: services/api/sbom-backend.json
          retention-days: 90

  sbom-frontend:
    name: SBOM frontend (CycloneDX)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci --ignore-scripts
      - run: npx --yes @cyclonedx/cyclonedx-npm --output-format JSON --output-file sbom-frontend.json
      - uses: actions/upload-artifact@v7
        with:
          name: sbom-frontend
          path: apps/web/sbom-frontend.json
          retention-days: 90

  lockfile-lint:
    name: Lockfile lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # Detecta tarballs com URLs maliciosas (typosquatting, mirrors comprometidos).
      - run: npx --yes lockfile-lint --path services/api/package-lock.json --type npm --validate-https --allowed-hosts npm
      - run: npx --yes lockfile-lint --path apps/web/package-lock.json --type npm --validate-https --allowed-hosts npm
