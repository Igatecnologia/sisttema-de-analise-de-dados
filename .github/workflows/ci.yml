name: CI

on:
  pull_request:
    branches: [main, develop, master]
  push:
    branches: [main, develop, master]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    env:
      NODE_ENV: test
      IGA_DATA_DIR: ${{ runner.temp }}/iga-backend-data
      ADMIN_DEFAULT_EMAIL: admin@iga.com
      # Fixed CI test password — match em .gitleaks.toml allowlist. Producao usa secret manager.
      ADMIN_DEFAULT_PASSWORD: CITestNotASecret2026!
      FRONTEND_URL: http://127.0.0.1:4173
      PROXY_CACHE_TTL_MS: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: services/api/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - run: npm run test
      # Coverage report (não-bloqueante: sucesso mesmo se script não existir)
      - name: Coverage report
        if: always()
        run: npm run test:coverage || true
      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: services/api/coverage/
          if-no-files-found: ignore
          retention-days: 7

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    env:
      VITE_API_BASE_URL: http://127.0.0.1:3000
      VITE_HTTP_TIMEOUT_MS: "180000"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm run test:unit
      - name: Upload frontend bundle stats
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: apps/web/dist/
          if-no-files-found: ignore
          retention-days: 3

  docker:
    name: Docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
      - run: docker build --target production -t iga-gestao:${{ github.sha }} .
