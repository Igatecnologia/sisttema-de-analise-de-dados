version: 2
updates:
  # Backend Node
  - package-ecosystem: "npm"
    directory: "/services/api"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      production:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      dev:
        dependency-type: "development"
        update-types: ["minor", "patch"]
    labels: ["deps", "backend"]

  # Frontend
  - package-ecosystem: "npm"
    directory: "/apps/web"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      production:
        dependency-type: "production"
        update-types: ["minor", "patch"]
      dev:
        dependency-type: "development"
        update-types: ["minor", "patch"]
    labels: ["deps", "frontend"]

  # Landing
  - package-ecosystem: "npm"
    directory: "/apps/landing"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["deps", "landing"]

  # Admin
  - package-ecosystem: "npm"
    directory: "/apps/admin"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels: ["deps", "admin"]

  # AI service Python
  - package-ecosystem: "pip"
    directory: "/services/ai"
    schedule:
      interval: "weekly"
      day: "tuesday"
    open-pull-requests-limit: 3
    labels: ["deps", "ai-service"]

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["deps", "ci"]

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["deps", "docker"]

  - package-ecosystem: "docker"
    directory: "/services/ai"
    schedule:
      interval: "weekly"
    labels: ["deps", "docker", "ai-service"]
