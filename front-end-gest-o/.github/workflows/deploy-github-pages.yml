# TEMPORÁRIO: pré-visualização do front para o cliente (URL pública a cada push).
# Não substitui deploy de produção (Vercel/Netlify/etc.).
# Projeto em subpasta: /<nome-do-repo>/
# Ative em: Repositório → Settings → Pages → Build and deployment → Source: GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          # Mesmo caminho da URL: https://<org>.github.io/<nome-do-repo>/
          VITE_BASE: /${{ github.event.repository.name }}/
          VITE_USE_MOCKS: 'false'
        run: npm run build

      - name: SPA fallback (404 → index)
        run: node scripts/gh-pages-spa-fallback.mjs

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
