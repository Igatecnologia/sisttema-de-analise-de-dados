<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IGA Gestao</title>
  <style>
    :root {
      --bg-start: #0a1d34;
      --bg-end: #122a48;
      --accent: #5aa8ff;
      --accent-2: #1dd1a1;
    }
    body {
      margin: 0;
      font-family: "Inter", "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at 20% 0%, #12365f, var(--bg-start) 46%, var(--bg-end));
      color: #fff;
      display: grid;
      place-items: center;
      height: 100vh;
      overflow: hidden;
    }
    .box {
      text-align: center;
      display: grid;
      gap: 12px;
      width: 320px;
      padding: 24px 30px;
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.14);
      box-shadow: 0 22px 48px rgba(0, 0, 0, 0.28);
      animation: fadeIn 500ms ease-out both;
      backdrop-filter: blur(8px);
    }
    .logo-wrap {
      width: 94px;
      height: 94px;
      margin: 0 auto;
      display: grid;
      place-items: center;
      border-radius: 20px;
      background: linear-gradient(145deg, rgba(90, 168, 255, 0.24), rgba(29, 209, 161, 0.22));
      border: 1px solid rgba(255, 255, 255, 0.24);
    }
    .logo-img {
      width: 62px;
      height: 62px;
      object-fit: contain;
      filter: drop-shadow(0 5px 14px rgba(0, 0, 0, 0.24));
      animation: logoBreath 1600ms ease-in-out infinite;
    }
    .title {
      font-size: 24px;
      font-weight: 800;
      letter-spacing: 0.6px;
      font-family: "Sora", "Inter", sans-serif;
    }
    .subtitle {
      font-size: 14px;
      opacity: 0.88;
      min-height: 20px;
    }
    .loader {
      width: 100%;
      height: 6px;
      border-radius: 999px;
      margin: 0 auto;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.18);
    }
    .loader::before {
      content: "";
      display: block;
      width: 35%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      animation: loading 1400ms ease-in-out infinite;
    }
    @keyframes fadeIn {
      from { transform: translateY(10px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    @keyframes logoBreath {
      0%, 100% { transform: scale(0.96) rotate(-1deg); opacity: 0.92; }
      50% { transform: scale(1.04) rotate(1deg); opacity: 1; }
    }
    @keyframes loading {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(280%); }
    }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo-wrap">
      <img class="logo-img" src="assets/logo.png" alt="Logo IGA" />
    </div>
    <div class="title">IGA Gestao</div>
    <div class="subtitle" id="splash-status">Iniciando servidor...</div>
    <div class="loader"></div>
  </div>
  <script>
    const statuses = ['Iniciando servidor...', 'Carregando interface...', 'Quase pronto...']
    let idx = 0
    setInterval(() => {
      idx = (idx + 1) % statuses.length
      const el = document.getElementById('splash-status')
      if (el) el.textContent = statuses[idx]
    }, 700)
  </script>
</body>
</html>
