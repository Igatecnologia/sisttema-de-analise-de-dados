# IGA Gestao — config de deploy no Render.
# Plano:
#   - Backend API: Render (este service) — recebe requests HTTP
#   - Backend Worker: Render (segundo service) — roda schedulers (trial expiry,
#     scheduled reports, webhook recovery, cache warm, db backup, copilot retention).
#     Requer plano pago (Render free NAO suporta workers persistentes).
#     Se ficar em free, alternativa é GitHub Actions chamando /api/v1/internal-jobs/*.
#   - Frontend: Vercel (deploy separado) — apontando VITE_API_BASE_URL pra cá
#   - Postgres: Supabase (500MB free / paid acima disso)
#   - Redis: Upstash (10k req/dia free / paid acima)
#
# Render Postgres free expira em 90 dias — por isso usamos Supabase external.

services:
  - type: web
    name: iga-gestao-api
    runtime: node
    region: oregon
    plan: free
    # /health/ready valida DB + Redis. /health/live só checa o processo.
    healthCheckPath: /health/ready
    buildCommand: cd services/api && npm ci && npm run build
    startCommand: cd services/api && node dist/server.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      # Service web — NAO roda schedulers (worker service cuida disso).
      # Se voce nao subir o worker (plano free), troque para "" ou remova esta key
      # para que os schedulers rodem aqui mesmo.
      - key: IGA_PROCESS_ROLE
        value: web

      # ── Storage (Supabase Postgres + Upstash Redis) ───────────────────────
      - key: IGA_STORAGE_DRIVER
        value: postgres
      - key: POSTGRES_SSL
        value: "1"
      - key: POSTGRES_POOL_MAX
        value: "5"
      # DATABASE_URL — Supabase: usar Connection Pooler (transaction mode, port 6543)
      # Formato: postgresql://postgres.<ref>:<senha>@aws-0-<region>.pooler.supabase.com:6543/postgres
      - key: DATABASE_URL
        sync: false
      # REDIS_URL — Upstash: rediss://default:<senha>@<host>.upstash.io:6379
      - key: REDIS_URL
        sync: false

      # ── Beta gratuito: gate de billing desativado ─────────────────────────
      # Billing real (Stripe). Sem BILLING_GATE_DISABLED em producao:
      # trial expirado/assinatura inativa bloqueia via 402.
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE
        sync: false
      - key: BILLING_SUCCESS_URL
        sync: false
      - key: BILLING_CANCEL_URL
        sync: false
      - key: BILLING_PORTAL_RETURN_URL
        sync: false

      # ── Auth + secrets (gerar localmente, nao commitar) ──────────────────
      - key: ADMIN_DEFAULT_EMAIL
        sync: false
      - key: ADMIN_DEFAULT_PASSWORD
        sync: false
      # openssl rand -hex 48
      - key: IGA_SESSION_JWT_SECRET
        sync: false
      # openssl rand -hex 32
      - key: IGA_SECRETS_KEY
        sync: false
      - key: SUPER_ADMIN_EMAILS
        sync: false

      # ── CORS + frontend ───────────────────────────────────────────────────
      # FRONTEND_URL = URL do deploy Vercel (ex: https://iga-gestao.vercel.app)
      - key: FRONTEND_URL
        sync: false
      # CORS — origens permitidas ALEM da FRONTEND_URL canonica.
      # Padrao restritivo: apenas subdominios igagestao.com.br + o app deste deploy no Vercel.
      # Ajuste o nome do app Vercel antes do deploy (ex.: app-igagestao-xyz).
      # NAO use ".+\\.vercel\\.app$" — qualquer Vercel app teria CORS (risco de takeover).
      - key: CORS_TENANT_DOMAIN_REGEX
        sync: false

      # ── Email transacional ────────────────────────────────────────────────
      # SMTP_HOST + SMTP_FROM sao obrigatorios em prod (validados em envValidation.ts).
      # Sugestoes: Amazon SES, Mailgun, SendGrid, Brevo, Postmark.
      # RESEND_API_KEY listado por compatibilidade — atualmente NAO usado pelo backend
      # (transactionalEmail.ts so consome SMTP_*). Deixar vazio se nao usar.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "0"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: PUBLIC_BASE_URL
        sync: false

      # ── Anti-bot ──────────────────────────────────────────────────────────
      - key: TURNSTILE_SECRET
        sync: false

      # ── Observabilidade (opcional) ────────────────────────────────────────
      - key: SENTRY_DSN
        sync: false

      # ── Logs/operacionais ─────────────────────────────────────────────────
      - key: LOG_PROXY_DATA
        value: "0"
      - key: SECURITY_CONTACT_EMAIL
        value: security@igagestao.com.br

  # ─────────────────────────────────────────────────────────────────────────
  # Worker — schedulers (trial expiry, scheduled reports, webhook recovery,
  # cache warm, db backup, copilot retention). Requer plano PAGO no Render.
  # Compartilha o mesmo banco/Redis/secret store que o service web acima.
  # Se nao puder subir (plano free), defina IGA_PROCESS_ROLE="" no service web
  # acima para que os schedulers rodem dentro do API.
  # ─────────────────────────────────────────────────────────────────────────
  - type: worker
    name: iga-gestao-worker
    runtime: node
    region: oregon
    plan: starter
    buildCommand: cd services/api && npm ci && npm run build
    startCommand: cd services/api && node dist/worker.js
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: IGA_PROCESS_ROLE
        value: worker
      - key: IGA_STORAGE_DRIVER
        value: postgres
      - key: POSTGRES_SSL
        value: "1"
      - key: POSTGRES_POOL_MAX
        value: "3"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: IGA_SESSION_JWT_SECRET
        sync: false
      - key: IGA_SECRETS_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_SECURE
        value: "0"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SENTRY_DSN
        sync: false
      - key: LOG_PROXY_DATA
        value: "0"
